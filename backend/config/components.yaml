components:
  WeatherCard:
    id: WeatherCard
    description: Show destination weather, temperature, and travel-friendly conditions.
    allowed_spans: [3, 4, 6]
    preferred_span: 4
    props_schema:
      type: object
      required: [city, date, weather, temperature, humidity]
      additionalProperties: false
      properties:
        city:
          type: string
        date:
          type: string
        temperature:
          type: string
        weather:
          type: string
        humidity:
          type: string
    usage_guidance: Use for current or forecast weather at a destination.
    example_props:
      city: Shanghai
      date: "2026-06-04"
      weather: Cloudy
      temperature: 24C
      humidity: 68%
  HotelList:
    id: HotelList
    description: Present recommended hotels with names, locations, prices, and highlights.
    allowed_spans: [6, 8, 12]
    preferred_span: 8
    props_schema:
      type: object
      required: [hotels]
      additionalProperties: false
      properties:
        hotels:
          type: array
    usage_guidance: Use when comparing multiple accommodation options.
    example_props:
      hotels:
        - name: Harbor View Hotel
          location: Near the Bund
          price: "$180/night"
          rating: 4.8
  AttractionList:
    id: AttractionList
    description: Present attractions or itinerary stops with short reasons to visit.
    allowed_spans: [6, 8, 12]
    preferred_span: 8
    props_schema:
      type: object
      required: [attractions]
      additionalProperties: false
      properties:
        attractions:
          type: array
    usage_guidance: Use for sightseeing recommendations, day plans, or themed destination lists.
    example_props:
      attractions:
        - name: Yu Garden
          type: Culture
          description: Historic garden with classical architecture.
          duration: 2 hours
          rating: 4.7
  FlightCard:
    id: FlightCard
    description: Show a flight option with route, times, airline, duration, and price.
    allowed_spans: [4, 6]
    preferred_span: 6
    props_schema:
      type: object
      required: [flight_number, departure, arrival, date, passenger, status, gate, seat]
      additionalProperties: false
      properties:
        flight_number:
          type: string
        departure:
          type: string
        arrival:
          type: string
        date:
          type: string
        passenger:
          type: string
        status:
          type: string
        gate:
          type: string
        seat:
          type: string
    usage_guidance: Use for a single highlighted flight or best itinerary option.
    example_props:
      flight_number: MU123
      departure: Shanghai
      arrival: Osaka
      date: "2026-06-04"
      passenger: Alice
      status: Confirmed
      gate: A12
      seat: 18A
  ProgressBar:
    id: ProgressBar
    description: Show task, booking, or itinerary planning progress.
    allowed_spans: [3, 4, 6, 12]
    preferred_span: 4
    props_schema:
      type: object
      required: [step, total]
      additionalProperties: false
      properties:
        step:
          type: number
        total:
          type: number
    usage_guidance: Use for completion state, planning progress, or multi-step workflow status.
    example_props:
      step: 2
      total: 5
