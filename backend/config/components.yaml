components:
  WeatherCard:
    id: WeatherCard
    description: Show destination weather, temperature, and travel-friendly conditions.
    allowed_spans: [3, 4, 6]
    preferred_span: 4
    props_schema:
      type: object
      required: [city, temperature, condition, humidity, wind]
      additionalProperties: false
      properties:
        city:
          type: string
        date:
          type: string
        temperature:
          type: string
        weather:
          type: string
        humidity:
          type: string
    usage_guidance: Use for current or forecast weather at a destination.
    example_props:
      city: Shanghai
      temperature: 24C
      condition: Cloudy
      humidity: 68%
      wind: Light breeze
  HotelList:
    id: HotelList
    description: Present recommended hotels with names, locations, prices, and highlights.
    allowed_spans: [6, 8, 12]
    preferred_span: 8
    props_schema:
      type: object
      required: [hotels]
      additionalProperties: false
      properties:
        hotels:
          type: array
    usage_guidance: Use when comparing multiple accommodation options.
    example_props:
      title: Recommended hotels
      hotels:
        - name: Harbor View Hotel
          location: Near the Bund
          price: "$180/night"
          highlight: River view
  AttractionList:
    id: AttractionList
    description: Present attractions or itinerary stops with short reasons to visit.
    allowed_spans: [6, 8, 12]
    preferred_span: 8
    props_schema:
      type: object
      required: [attractions]
      additionalProperties: false
      properties:
        attractions:
          type: array
    usage_guidance: Use for sightseeing recommendations, day plans, or themed destination lists.
    example_props:
      title: Top attractions
      attractions:
        - name: Yu Garden
          description: Historic garden with classical architecture.
          duration: 2 hours
  FlightCard:
    id: FlightCard
    description: Show a flight option with route, times, airline, duration, and price.
    allowed_spans: [4, 6]
    preferred_span: 6
    props_schema:
      type: object
      required: [flight_number, departure, arrival, date, passenger, status, gate, seat]
      additionalProperties: false
      properties:
        flight_number:
          type: string
        departure:
          type: string
        arrival:
          type: string
        date:
          type: string
        passenger:
          type: string
        status:
          type: string
        gate:
          type: string
        seat:
          type: string
    usage_guidance: Use for a single highlighted flight or best itinerary option.
    example_props:
      airline: China Eastern
      route: PVG -> KIX
      departure: "09:30"
      arrival: "12:45"
      duration: 2h 45m
      price: "$320"
  ProgressBar:
    id: ProgressBar
    description: Show task, booking, or itinerary planning progress.
    allowed_spans: [3, 4, 6, 12]
    preferred_span: 4
    props_schema:
      type: object
      required: [step, total]
      additionalProperties: false
      properties:
        step:
          type: number
        total:
          type: number
    usage_guidance: Use for completion state, planning progress, or multi-step workflow status.
    example_props:
      label: Planning progress
      value: 65
      max: 100
      status: Finding hotels
